server:
  port: 8082

spring:
  application:
    name: gov-item-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: gov-platform
        group: DEFAULT_GROUP
      config:
        server-addr: localhost:8848
        namespace: gov-platform
        group: DEFAULT_GROUP
        file-extension: yaml
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/gov_item?useUnicode=true&characterEncoding=utf8mb4&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123456
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
  redis:
    host: localhost
    port: 6379
    database: 2

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.gov.item.entity
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

knife4j:
  enable: true

logging:
  level:
    com.gov.item: debug