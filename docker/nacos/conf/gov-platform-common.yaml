# ==================== 共享 Nacos 配置 ====================
# Data ID: gov-platform-common.yaml
# Group: DEFAULT_GROUP
# Namespace: gov-platform
# 供所有微服务共享的通用配置

spring:
  cloud:
    sentinel:
      enabled: true
      transport:
        dashboard: localhost:8858
        port: 8719
      eager: true
      datasource:
        ds1:
          nacos:
            server-addr: localhost:8848
            namespace: gov-platform
            group: DEFAULT_GROUP
            data-id: gov-sentinel-flow-rules.json
            data-type: json
            rule-type: flow

# Feign 中启用 Sentinel
feign:
  sentinel:
    enabled: true
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000
        loggerLevel: BASIC
