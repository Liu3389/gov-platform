# ==================== 共享 Nacos 配置 ====================
# Data ID: gov-platform-common.yaml
# Group: DEFAULT_GROUP
# Namespace: gov-platform
# 供所有微服务共享的通用配置

spring:
  cloud:
    sentinel:
      enabled: true
      transport:
        dashboard: localhost:8858
        port: 8719
      eager: true
      datasource:
        ds1:
          nacos:
            server-addr: localhost:8848
            namespace: gov-platform
            group: DEFAULT_GROUP
            data-id: gov-sentinel-flow-rules.json
            data-type: json
            rule-type: flow

  # RabbitMQ 消息队列（连接宿主机端口 5673）
  rabbitmq:
    host: localhost
    port: 5673
    username: guest
    password: guest
    # 生产者确认
    publisher-confirm-type: correlated
    publisher-returns: true

# ==================== Seata 分布式事务 ====================
# 依赖已在 gov-common/pom.xml 中引入，每个服务的 application-dev.yml 中设置 seata.enabled
# 当前 seata.enabled=false（不连 Server），部署 Seata Server 后改为 true 即可
seata:
  enabled: false

# Feign 中启用 Sentinel
feign:
  sentinel:
    enabled: true
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000
        loggerLevel: BASIC
