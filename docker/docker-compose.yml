
version: "3.9"
networks:
  gov-net:
    driver: bridge
volumes:
  mysql_data:
  redis_data:
  nacos_data:
  nacos_logs:
  rabbitmq_data:
  nginx_logs:

services:
  # ==================== MySQL ====================
  mysql:
    image: mysql:8.0.36
    container_name: gov-mysql
    restart: always
    networks: [gov-net]
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: nacos
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - ./mysql/init:/docker-entrypoint-initdb.d
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: gov-redis
    restart: always
    networks: [gov-net]
    ports:
      - "6380:6379"
    environment:
      TZ: Asia/Shanghai
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  # ==================== Nacos ====================
  nacos:
    image: nacos/nacos-server:v2.3.2
    platform: linux/amd64
    container_name: gov-nacos
    restart: always
    networks: [gov-net]
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      MODE: standalone
      JVM_XMS: 512m
      JVM_XMX: 512m
      JVM_XMN: 256m
      NACOS_AUTH_ENABLE: true
      NACOS_AUTH_IDENTITY_KEY: serverIdentity
      NACOS_AUTH_IDENTITY_VALUE: security
      NACOS_AUTH_TOKEN: SecretKey012345678901234567890123456789012345678901234567890123456789
      TZ: Asia/Shanghai
    volumes:
      - nacos_logs:/home/nacos/logs
      - nacos_data:/home/nacos/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s -o /dev/null -w '%{http_code}' http://localhost:8848/nacos/ | grep 200 || exit 1"
        ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 90s

  # ==================== Nacos 初始化 ====================
  nacos-init:
    image: curlimages/curl:8.7.1
    container_name: gov-nacos-init
    networks: [gov-net]
    depends_on:
      nacos:
        condition: service_healthy
    environment:
      NACOS_URL: http://nacos:8848
      NACOS_USERNAME: nacos
      NACOS_PASSWORD: nacos
      TZ: Asia/Shanghai
    volumes:
      - ./nacos/conf:/nacos-config:ro
      - ./nacos/init-nacos.sh:/init-nacos.sh:ro
    entrypoint:
      - /bin/sh
      - -c
      - cp /init-nacos.sh /tmp/init-nacos.sh && chmod +x /tmp/init-nacos.sh && sh /tmp/init-nacos.sh
    restart: "no"

  # ==================== RabbitMQ ====================
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: gov-rabbitmq
    restart: always
    networks: [gov-net]
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      TZ: Asia/Shanghai
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  # ==================== Sentinel Dashboard ====================
  sentinel:
    image: bladex/sentinel-dashboard:1.8.6
    container_name: gov-sentinel
    restart: always
    networks: [gov-net]
    ports:
      - "8858:8858"
    environment:
      SENTINEL_AUTH_USERNAME: sentinel
      SENTINEL_AUTH_PASSWORD: sentinel
      TZ: Asia/Shanghai

  # ==================== SkyWalking 链路追踪（第一阶段） ====================
  # OAP Server — 接收 Agent 上报的链路数据
  skywalking-oap:
    image: apache/skywalking-oap-server:9.7.0
    container_name: gov-skywalking-oap
    restart: always
    networks: [gov-net]
    ports:
      - "11800:11800"   # gRPC（Agent 上报端口）
      - "12800:12800"   # HTTP（Agent 上报端口）
    environment:
      SW_STORAGE: h2
      SW_HEALTH_CHECKER: default
      SW_TELEMETRY: prometheus
      TZ: Asia/Shanghai
    healthcheck:
      test: ["CMD", "bash", "-c", "cat < /dev/null > /dev/tcp/127.0.0.1/12800"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # SkyWalking UI — 链路追踪可视化界面
  skywalking-ui:
    image: apache/skywalking-ui:9.7.0
    container_name: gov-skywalking-ui
    restart: always
    networks: [gov-net]
    depends_on:
      skywalking-oap:
        condition: service_healthy
    ports:
      - "18080:8080"
    environment:
      SW_OAP_ADDRESS: http://skywalking-oap:12800
      TZ: Asia/Shanghai

  # ==================== Nginx ====================
  nginx:
    image: nginx:1.25-alpine
    container_name: gov-nginx
    restart: always
    networks: [gov-net]
    depends_on:
      nacos:
        condition: service_healthy
    ports:
      - "80:80"
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    extra_hosts:
      # WSL2 需要显式映射 host.docker.internal 到宿主机
      - "host.docker.internal:host-gateway"
