services:
  # ==================== MySQL ====================
  mysql:
    image: mysql:8.0.33
    container_name: gov-mysql
    restart: always
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: nacos
      TZ: Asia/Shanghai
    volumes:
      # ==================== SQL 一键执行 ====================
      # Docker 按文件名顺序自动执行 init/ 下所有 .sql 文件：
      # 01-init-db.sql → 02~11建表 → 99-init-data.sql
      - ./mysql/init:/docker-entrypoint-initdb.d
      - mysql_data:/var/lib/mysql
    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: gov-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # ==================== Nacos ====================
  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: gov-nacos
    platform: linux/amd64
    restart: always
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: true
      NACOS_AUTH_TOKEN: SecretKey012345678901234567890123456789012345678901234567890123456789
      NACOS_AUTH_IDENTITY_KEY: serverIdentity
      NACOS_AUTH_IDENTITY_VALUE: security
    volumes:
      - nacos_logs:/home/nacos/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8848/nacos/v1/console/health/readiness | grep -q ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # ==================== Nacos 自动初始化容器 ====================
  # 在 Nacos 启动后自动创建命名空间、导入共享配置和 Sentinel 规则
  nacos-init:
    image: curlimages/curl:8.7.1
    container_name: gov-nacos-init
    depends_on:
      nacos:
        condition: service_healthy
    volumes:
      - ./nacos/conf:/nacos-config:ro
      - ./nacos/init-nacos.sh:/init-nacos.sh:ro
    entrypoint: ["/bin/sh", "/init-nacos.sh"]
    environment:
      NACOS_URL: http://nacos:8848
      NACOS_USERNAME: nacos
      NACOS_PASSWORD: nacos

  # ==================== RabbitMQ ====================
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: gov-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  # ==================== Sentinel Dashboard ====================
  sentinel:
    image: bladex/sentinel-dashboard:1.8.6
    container_name: gov-sentinel
    restart: always
    ports:
      - "8858:8858"
    environment:
      - SENTINEL_AUTH_USERNAME=sentinel
      - SENTINEL_AUTH_PASSWORD=sentinel

  # ==================== Nginx ====================
  nginx:
    image: nginx:1.25-alpine
    container_name: gov-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - nginx_logs:/var/log/nginx
    depends_on:
      - nacos

volumes:
  mysql_data:
  redis_data:
  nacos_logs:
  rabbitmq_data:
  nginx_logs: