# ============================================
# Flyway 数据库版本管理配置
# 智慧政务一体化便民服务平台
# ============================================

# === 数据库连接 ===
flyway.url=jdbc:mysql://gov-mysql:3306?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4
flyway.user=root
flyway.password=root123456

# === 迁移脚本路径 ===
flyway.locations=filesystem:/flyway/schema,filesystem:/flyway/data

# === schema-history 表 ===
flyway.table=flyway_schema_history
flyway.defaultSchema=nacos

# === 编码 ===
flyway.encoding=UTF-8

# === 允许在迁移脚本中使用 USE 语句切换数据库 ===
# Flyway 默认不允许在迁移中使用其他数据库,这里放宽限制
flyway.sqlMigrationSuffixes=.sql

# === 失败时自动清除历史表（仅开发环境，生产禁用） ===
# flyway.cleanDisabled=true

# === 允许混合迁移（版本迁移 + 可重复迁移） ===
flyway.mixed=true

# === 校验失败不自动修复 ===
flyway.validateOnMigrate=true

# === 禁用占位符替换（SQL中的 ${...} 不是变量） ===
flyway.placeholderReplacement=false
