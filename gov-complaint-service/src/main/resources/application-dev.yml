server:
  port: 8086

spring:
  application:
    name: gov-complaint-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: gov-platform
      config:
        server-addr: localhost:8848
        namespace: gov-platform
        file-extension: yaml
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/gov_complaint?useUnicode=true&characterEncoding=utf8mb4&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123456
  redis:
    host: localhost
    port: 6379
    database: 6

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.gov.complaint.entity
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
  configuration:
    map-underscore-to-camel-case: true

knife4j:
  enable: true

logging:
  level:
    com.gov.complaint: debug